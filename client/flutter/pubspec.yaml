name: syncwatch
description: Synchronized media watch party app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Video playback
  media_kit: ^1.2.6
  media_kit_video: ^1.2.6
  media_kit_libs_video: ^1.0.5

  # Networking
  socket_io_client: ^3.1.4
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.4.9

  # Storage & paths
  path_provider: ^2.1.1
  path: ^1.9.0

  # Persistence
  shared_preferences: ^2.5.4

  # UI / routing
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
